      #dashboard-app {

      /* Slider Styles */
      input[type="range"] {
        -webkit-appearance: none;
        width: 100%;
        height: 6px;
        background: #333;
        border-radius: 5px;
        outline: none;
        margin: 15px 0;
        transition: all 0.2s;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        background: #008cba;
        cursor: pointer;
        border-radius: 50%;
        border: 2px solid #ffffff;
        box-shadow: 0 0 5px rgba(0, 140, 186, 0.5);
        transition: all 0.2s;
      }
      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
        background: #60e5ff;
      }
      input[type="range"]::-moz-range-thumb {
        width: 18px;
        height: 18px;
        background: #008cba;
        cursor: pointer;
        border-radius: 50%;
        border: 2px solid #ffffff;
        box-shadow: 0 0 5px rgba(0, 140, 186, 0.5);
      }

      /* Flip Animation Styles */
      .flip-container {
        perspective: 2000px;
        width: 100%;
        min-height: 800px;
      }
      .flip-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        transform-style: preserve-3d;
      }
      .flip-inner.flipped {
        transform: rotateY(180deg);
      }
      .flip-front,
      .flip-back {
        width: 100%;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }
      .flip-back {
        transform: rotateY(180deg);
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
      }

      /* Dashboard Karten Design für dunklen Hintergrund */
      .card-dark {
        background-color: #262626;
        border: 1px solid #333;
        color: #ffffff;
      }
      [data-lucide] {
        stroke-width: 2.5;
      }

      /* Tooltip Styles */
      .tooltip-container {
        position: relative;
        cursor: help;
      }
      .tooltip-text {
        visibility: hidden;
        width: 240px;
        background-color: #1a1a1a;
        color: #e2e8f0;
        text-align: left;
        border-radius: 12px;
        padding: 12px;
        position: absolute;
        z-index: 3000;
        bottom: 150%;
        left: 50%;
        transform: translateX(-50%);
        opacity: 0;
        transition: all 0.2s ease-out;
        font-size: 0.75rem;
        font-weight: 500;
        line-height: 1.5;
        box-shadow:
          0 20px 25px -5px rgba(0, 0, 0, 0.5),
          0 10px 10px -5px rgba(0, 0, 0, 0.04);
        pointer-events: none;
        border: 1px solid #333;
        backdrop-filter: blur(8px);
      }

      /* Mobile Optimierung für Tooltips */
      @media (max-width: 640px) {
        .tooltip-text {
          width: 200px;
          max-width: 80vw;
          left: 50%;
          transform: translateX(-50%);
        }
      }

      .tooltip-container:hover .tooltip-text {
        visibility: visible;
        opacity: 1;
        bottom: 125%;
      }
      .tooltip-text::after {
        content: "";
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        border-width: 8px;
        border-style: solid;
        border-color: #1a1a1a transparent transparent transparent;
      }
      /* Premium Flip Button (Uiverse logic) */
      .dgk-flip-btn {
        --border-radius: 16px;
        --padding: 4px;
        --transition: 0.4s;
        --button-color: #1a1a1a;
        --highlight-color-hue: 200deg;

        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        user-select: none;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0.6rem 1.5rem;
        font-family: "Inter", sans-serif;
        font-size: 0.875rem;
        font-weight: 900;
        background-color: var(--button-color);
        border: solid 1px rgba(255, 255, 255, 0.1);
        border-radius: var(--border-radius);
        cursor: pointer;
        transition: all var(--transition);
        box-shadow:
          inset 0px 1px 1px rgba(255, 255, 255, 0.1),
          0px 10px 30px rgba(0, 0, 0, 0.5);
      }

      .dgk-flip-btn::before {
        content: "";
        position: absolute;
        inset: calc(0px - var(--padding));
        border-radius: calc(var(--border-radius) + var(--padding));
        pointer-events: none;
        background-image: linear-gradient(0deg, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.6));
        z-index: -1;
        transition: all var(--transition);
      }

      .dgk-flip-btn::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        background-image: linear-gradient(
          0deg,
          #fff,
          hsl(var(--highlight-color-hue), 100%, 70%),
          hsla(var(--highlight-color-hue), 100%, 70%, 50%),
          8%,
          transparent
        );
        opacity: 0;
        transition: all var(--transition);
      }

      .dgk-flip-btn:hover {
        border: solid 1px hsla(var(--highlight-color-hue), 100%, 80%, 0.4);
        transform: translateX(-50%) translateY(-2px);
      }

      .dgk-flip-btn:hover::after {
        opacity: 1;
        mask-image: linear-gradient(0deg, #fff, transparent);
      }

      .btn-letter {
        position: relative;
        display: inline-block;
        color: rgba(255, 255, 255, 0.6);
        animation: letter-anim 3s ease-in-out infinite;
        transition: all var(--transition);
      }

      @keyframes letter-anim {
        50% {
          text-shadow: 0 0 5px hsla(var(--highlight-color-hue), 100%, 70%, 0.8);
          color: #fff;
        }
      }

      .btn-svg {
        height: 18px;
        width: 18px;
        margin-right: 0.75rem;
        stroke: #ed982b;
        transition: all var(--transition);
        filter: drop-shadow(0 0 2px rgba(237, 152, 43, 0.5));
      }

      .dgk-flip-btn:hover .btn-svg {
        stroke: #fff;
        filter: drop-shadow(0 0 5px #ed982b);
      }

      .dgk-flip-btn:active {
        transform: translateX(-50%) translateY(1px);
        background-color: hsla(var(--highlight-color-hue), 50%, 20%, 0.5);
      }

      .sticky-tabs-container {
        position: sticky !important;
        top: 70px !important;
        z-index: 1000 !important;
        margin-left: -1rem !important;

      }

      .sticky-tabs-container.is-sticky {
        padding: 0.4rem !important;
        background-color: rgba(38, 38, 38, 0.95) !important;
        backdrop-filter: blur(8px);
      }

      .sticky-tabs-container button {

      }

      .sticky-tabs-container.is-sticky i {
        width: 1.25rem !important;

      }

      /* Firefox & General Fallback: Disable 3D context when sticky to allow position:sticky to work */
      .flip-container.sticky-logic-active {

        transform: none !important;

      const { useState, useEffect } = React;

      class GlobalErrorBoundary extends React.Component {
        constructor(props) {
          super(props);
          this.state = { hasError: false };
        }
        static getDerivedStateFromError(error) {
          return { hasError: true };
        }
        componentDidCatch(error, errorInfo) {
          console.error("Dashboard Error:", error, errorInfo);
        }
        render() {
          if (this.state.hasError) {
            return (
              <div className="flex flex-col items-center justify-center py-20 text-center px-4 bg-slate-900 rounded-3xl border border-red-500/30">
                <div className="w-16 h-16 bg-red-500/20 text-red-500 rounded-2xl flex items-center justify-center mb-6">
                  <i data-lucide="alert-triangle" className="w-8 h-8"></i>
                </div>
                <h2 className="text-2xl font-bold text-white mb-4">Hoppla! Etwas ist schiefgelaufen.</h2>
                <p className="text-slate-400 mb-8 max-w-md">
                  Es gab ein technisches Problem beim Laden deines Dashboards. Möglicherweise sind gespeicherte Daten
                  fehlerhaft.
                </p>
                <div className="flex gap-4">
                  <button
                    onClick={() => window.location.reload()}
                    className="px-6 py-3 bg-[#008cba] text-white rounded-xl font-bold hover:bg-[#60e5ff] transition-all"
                  >
                    Seite neu laden
                  </button>
                  <button
                    onClick={() => {
                      if (
                        confirm("Möchtest du wirklich alle lokalen Daten löschen? Dies setzt das Dashboard zurück.")
                      ) {
                        Object.keys(localStorage).forEach((key) => {
                          if (key.startsWith("dgk_")) localStorage.removeItem(key);
                        });
                        window.location.reload();
                      }
                    }}
                    className="px-6 py-3 bg-red-600/20 text-red-400 rounded-xl font-bold hover:bg-red-600/40 transition-all border border-red-600/30"
                  >
                    Daten zurücksetzen
                  </button>
                </div>
              </div>
            );
          }
          return this.props.children;
        }
      }
      function SimProfitChart({ istUmsatz, simUmsatz, istNetto, simNetto }) {
        const chartRef = React.useRef(null);
        const chartInstance = React.useRef(null);

        React.useEffect(() => {
          if (chartRef.current && window.Chart) {
            const ctx = chartRef.current.getContext("2d");
            if (chartInstance.current) chartInstance.current.destroy();

            chartInstance.current = new Chart(ctx, {
              type: "bar",

                labels: ["Umsatz", "Netto-Gewinn"],

                    label: "Ist-Zustand",

      function BreakEvenChart({ initialInvest, monthlyRevenue, monthlyCostsCash }) {

        React.useEffect(() => {

            const ctx = chartRef.current.getContext("2d");
            if (chartInstance.current) chartInstance.current.destroy();

            const labels = Array.from({ length: 24 }, (_, i) => `M${i + 1}`);
            const revenueData = labels.map((_, i) => (i + 1) * monthlyRevenue);
            const costData = labels.map((_, i) => initialInvest + (i + 1) * monthlyCostsCash);

            chartInstance.current = new Chart(ctx, {
              type: "line",
              data: {
                labels: labels,
                datasets: [
                  {
                    label: "Kumulierter Umsatz",
                    data: revenueData,
                    borderColor: "#374955",
                    backgroundColor: "rgba(55, 73, 85, 0.1)",
                    fill: true,
                    tension: 0.1,
                  },
                  {
                    label: "Kumulierte Kosten (Cash)",
                    data: costData,
                    borderColor: "#a77948",
                    backgroundColor: "rgba(167, 121, 72, 0.1)",
                    fill: true,
                    tension: 0.1,
                  },
                ],
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,

                  y: {
                    beginAtZero: true,
                    grid: { color: "rgba(255,255,255,0.05)" },

                      color: "#94a3b8",
                      callback: (v) => v.toLocaleString("de-DE", { minimumFractionDigits: 0 }) + " €",

            if (chartInstance.current) chartInstance.current.destroy();
          };
        }, [initialInvest, monthlyRevenue, monthlyCostsCash]);

        return (
          <div className="h-64 w-full">
            <canvas ref={chartRef}></canvas>
          </div>
        );
      }

      function LiquidityProjectionChart({ data, labels }) {

          if (isOpen && window.lucide) {
            window.lucide.createIcons();
          }

        if (!isOpen) return null;

        const handleNext = () => {
          if (step < totalSteps) setStep(step + 1);

          if (step > 1) setStep(step - 1);

                  {step === 1 && (

                      <div className="w-16 h-16 bg-[#008cba]/20 text-[#008cba] rounded-2xl flex items-center justify-center mb-8">

                      </div>

                        <strong className="text-white font-bold">lokal in deinem Browser</strong> gespeichert.
                      </p>
                    </div>

                  {step === 2 && (
                    <div className="animate-in slide-in-from-right duration-500">

                      </div>
                      <h2 className="text-4xl font-black text-white mb-6 leading-tight">Basis schaffen</h2>
                      <p className="text-slate-400 text-lg leading-relaxed mb-10">

                        <strong className="text-white font-bold">Kontostand</strong> hilft uns, deinen finanziellen
                        Puffer (Runway) zu berechnen.
                      </p>
                      <div className="bg-[#262626] p-8 rounded-3xl border border-[#333] shadow-inner">
                        <label className="flex justify-between items-center text-[#008cba] text-xs font-black mb-4 uppercase tracking-widest">
                          Aktueller Kontostand (€)
                          <button
                            onClick={() => setShowAccountManager(true)}
                            className="text-[10px] bg-[#ed982b] hover:bg-[#f3a847] text-black px-4 py-1.5 rounded-xl transition-all uppercase font-black flex items-center gap-2 shadow-[0_4px_0_#9a5612] hover:shadow-[0_2px_0_#9a5612] hover:translate-y-[2px] active:translate-y-[4px] active:shadow-none"
                          >
                            <i data-lucide="plus-circle" className="w-3.5 h-3.5"></i>

                            value={currentValues.bankBalance}

                              const val = e.target.value;

                              if (accounts.length <= 1) {
                                setAccounts([{ ...accounts[0], balance: Number(val) || 0 }]);
                              }
                            }}
                            disabled={accounts.length > 1}
                            className={`w-full bg-transparent border-b-2 border-slate-700 rounded-none px-0 py-4 text-4xl font-black text-white outline-none focus:border-[#008cba] transition-all ${accounts.length > 1 ? "opacity-50 cursor-not-allowed" : ""}`}
                            autoFocus
                          />
                        </div>
                      </div>
                    </div>
                  )}

                  {step === 3 && (
                    <div className="animate-in slide-in-from-right duration-500">
                      <div className="w-16 h-16 bg-[#008cba]/20 text-[#008cba] rounded-2xl flex items-center justify-center mb-8">

                      </div>
                      <h2 className="text-4xl font-black text-white mb-6 leading-tight">Umsatz erfassen</h2>
                      <p className="text-slate-400 text-lg leading-relaxed mb-10">

                          value={currentValues.monthlyRevenue}

                          className="w-full bg-transparent border-b-2 border-slate-700 rounded-none px-0 py-4 text-4xl font-black text-white outline-none focus:border-[#008cba] transition-all"
                          autoFocus
                        />
                      </div>
                    </div>
                  )}

                  {step === 4 && (
                    <div className="animate-in slide-in-from-right duration-500">
                      <div className="w-16 h-16 bg-[#008cba]/20 text-[#008cba] rounded-2xl flex items-center justify-center mb-8">

                      </div>
                      <h2 className="text-4xl font-black text-white mb-6 leading-tight">Fixkosten</h2>
                      <p className="text-slate-400 text-lg leading-relaxed mb-10">
                        Was zahlst du jeden Monat sicher aus (Miete, Tools, Versicherungen)? Gib hier die{" "}
                        <strong className="text-white font-bold">Gesamtsumme</strong> an.
                      </p>
                      <div className="bg-[#262626] p-8 rounded-3xl border border-[#333] shadow-inner">
                        <label className="block text-[#008cba] text-xs font-black mb-4 uppercase tracking-widest">
                          Fixkosten (€ p.M.)
                        </label>
                        <input
                          type="number"
                          value={currentValues.fixedCosts}
                          onChange={(e) => setters.setFixedCosts(e.target.value)}

                          autoFocus
                        />

                    </div>

                  {step === 5 && (

                      <div className="w-16 h-16 bg-[#008cba]/20 text-[#008cba] rounded-2xl flex items-center justify-center mb-8">

                      </div>
                      <h2 className="text-4xl font-black text-white mb-6 leading-tight">Variable Kosten</h2>
                      <p className="text-slate-400 text-lg leading-relaxed mb-10">

                        setze <strong className="text-white font-bold">0€</strong> ein.
                      </p>
                      <div className="bg-[#262626] p-8 rounded-3xl border border-[#333] shadow-inner">
                        <label className="block text-[#008cba] text-xs font-black mb-4 uppercase tracking-widest">
                          Variable Kosten (€ p.M.)
                        </label>
                        <input
                          type="number"
                          value={currentValues.variableCosts}
                          onChange={(e) => setters.setVariableCosts(e.target.value)}
                          className="w-full bg-transparent border-b-2 border-slate-700 rounded-none px-0 py-4 text-4xl font-black text-white outline-none focus:border-[#008cba] transition-all"
                          autoFocus
                        />
                      </div>
                    </div>
                  )}

                  {step === 6 && (
                    <div className="animate-in zoom-in duration-500 text-center">
                      <div className="w-24 h-24 bg-green-500/20 text-green-500 rounded-full flex items-center justify-center mx-auto mb-10 shadow-[0_0_40px_rgba(34,197,94,0.2)]">
                        <i data-lucide="check" className="w-12 h-12"></i>
                      </div>
                      <h2 className="text-4xl font-black text-white mb-6 leading-tight">Alles fertig!</h2>
                      <p className="text-slate-400 text-lg leading-relaxed mb-10">
                        Dein Strategie-Navigator ist bereit. Du kannst nun deine{" "}
                        <strong className="text-white font-bold">Profitabilität</strong> und{" "}
                        <strong className="text-white font-bold">Liquidität</strong> in Echtzeit verfolgen.
                      </p>
                    </div>
                  )}
                </div>

                <div className="flex gap-6 mt-16">
                  {step > 1 && (
                    <button
                      onClick={handleBack}
                      className="flex-1 py-5 bg-slate-800 hover:bg-slate-700 text-white rounded-2xl font-bold transition-all border border-[#444] shadow-lg"
                    >
                      Zurück
                    </button>
                  )}
                  <button
                    onClick={handleNext}
                    className="flex-[2] py-5 bg-[#008cba] hover:bg-[#60e5ff] text-black rounded-2xl font-black text-xl transition-all shadow-xl shadow-[#008cba]/20 flex items-center justify-center gap-3"
                  >
                    {step === totalSteps ? "Dashboard erkunden" : "Weiter"}
                    <i data-lucide="arrow-right" className="w-5 h-5"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>

      function App() {
        const [activeTab, setActiveTab] = useState("dashboard");
        const [isExporting, setIsExporting] = useState(false);
        const [showExportDropdown, setShowExportDropdown] = useState(false);
        const [isFlipped, setIsFlipped] = useState(false);
        const [isPro, setIsPro] = useState(() => {
          const saved = localStorage.getItem("dgk_dash_isPro");
          return saved === "true";
        });
        const [showGuide, setShowGuide] = useState(() => {
          const saved = localStorage.getItem("dgk_dash_showGuide");
          return saved === null ? true : saved === "true";
        });
        const [efficiencyPotential, setEfficiencyPotential] = useState(() => {
          try {
            const saved = localStorage.getItem("dgk_efficiency_potential");
            return saved ? JSON.parse(saved) : null;
          } catch (e) {
            console.error("Error parsing efficiency potential", e);
            return null;
          }
        });
        const [isSticky, setIsSticky] = useState(false);
        const [showWizard, setShowWizard] = useState(false);
        const tabsRef = React.useRef(null);
        const exportDropdownRef = React.useRef(null);

        useEffect(() => {
          const handleClickOutside = (event) => {
            if (exportDropdownRef.current && !exportDropdownRef.current.contains(event.target)) {
              setShowExportDropdown(false);
            }
          };
          document.addEventListener("mousedown", handleClickOutside);
          return () => document.removeEventListener("mousedown", handleClickOutside);
        }, []);

        useEffect(() => {
          const handleScroll = () => {
            if (tabsRef.current) {
              const rect = tabsRef.current.getBoundingClientRect();

        // --- DEFAULTS ---
        const DEFAULTS = {

          const delimiter = lines[0].includes(";") ? ";" : ",";
          return lines.map((line) => line.split(delimiter).map((c) => c.trim().replace(/^"|"$/g, "")));

        const isModified = () => {

        // Automatisches Speichern bei Änderung
        useEffect(() => {
          localStorage.setItem("dgk_dash_bankBalance", bankBalance);

        }, [

          marketingCosts,

        ]);

        // Synchronize bankBalance sum when accounts change
        useEffect(() => {
          const total = accounts.reduce((sum, acc) => sum + (Number(acc.balance) || 0), 0);
          if (total !== Number(bankBalance)) {
            setBankBalance(total);
          }
        }, [accounts]);

        // NEU: Synchronisierung der einfachen Kostenfelder im Expertenmodus
        useEffect(() => {
          if (isPro) {
            // Wir mappen die Experten-Felder auf die einfache Ansicht:
            // Variable Kosten = Wareneinsatz (COGS)
            // Fixkosten = Summe aller anderen betrieblichen Ausgaben
            const calculatedFixed =
              Number(financing) +
              Number(rentCosts) +
              Number(personnelCosts) +
              Number(marketingCosts) +
              Number(otherCosts) +
              Number(depreciation);
            setFixedCosts(calculatedFixed);
            setVariableCosts(Number(cogs));
          }
        }, [isPro, financing, rentCosts, personnelCosts, marketingCosts, otherCosts, depreciation, cogs]);

        const n_bankBalance = Number(bankBalance) || 0;
        const n_monthlyRevenue = Number(monthlyRevenue) || 0;
        const n_fixedCosts = Number(fixedCosts) || 0;
        const n_variableCosts = Number(variableCosts) || 0;
        const n_hoursWorked = Number(hoursWorked) || 0;
        const n_targetNetIncome = Number(targetNetIncome) || 0;
        const n_taxRate = Number(taxRate) || 0;
        const n_billableHours = Number(billableHours) || 0;
        const n_financing = Number(financing) || 0;
        const n_rentCosts = Number(rentCosts) || 0;
        const n_personnelCosts = Number(personnelCosts) || 0;
        const n_cogs = Number(cogs) || 0;
        const n_marketingCosts = Number(marketingCosts) || 0;
        const n_otherCosts = Number(otherCosts) || 0;
        const n_depreciation = Number(depreciation) || 0;
        const n_revenueBufferPercent = Number(revenueBufferPercent) || 0;

        // Da die Werte im Hintergrund synchronisiert werden, reicht diese einfache Summe
        const totalCosts = n_fixedCosts + n_variableCosts;
        const monthlyProfit = n_monthlyRevenue - totalCosts;
        const runwayMonths = totalCosts > 0 ? (n_bankBalance / totalCosts).toFixed(1) : "0";

        const currentMonthIdx = new Date().getMonth();
        const monthNames = ["Jan", "Feb", "Mär", "Apr", "Mai", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dez"];

        const { projectedLiquidity, projectionLabels } = React.useMemo(() => {
          let currentBalance = Number(bankBalance);
          const projection = [];
          const labels = [];
          let accruedTax = 0;

          // Cash-relevante Kosten = Gesamtkosten minus Abschreibungen
          const cashCosts = totalCosts - n_depreciation;

          for (let i = 0; i < 12; i++) {
            const monthIdx = (currentMonthIdx + i) % 12;
            const factorRaw = Number(seasonalFactors[monthIdx]) || 0;
            const factor = Math.max(0, 100 + factorRaw) / 100;
            const rev = Number(monthlyRevenue) * factor;

            // Steuer-Basis ist der Gewinn (Umsatz - alle Kosten inkl. Abschreibung)
            const monthlyProfitForTax = rev - totalCosts;
            const taxThisMonth = monthlyProfitForTax > 0 ? monthlyProfitForTax * (n_taxRate / 100) : 0;
            accruedTax += taxThisMonth;

            let taxPayment = 0;
            if (taxPaymentRhythm === "monthly") {
              taxPayment = taxThisMonth;
              accruedTax = 0;
            } else if (taxPaymentRhythm === "quarterly") {
              // Quartalszahlungen in Mär(2), Jun(5), Sep(8), Dez(11)
              if ([2, 5, 8, 11].includes(monthIdx)) {
                taxPayment = accruedTax;
                accruedTax = 0;
              }
            } else if (taxPaymentRhythm === "annual") {
              // Einmalzahlung im Dezember
              if (monthIdx === 11) {
                taxPayment = accruedTax;
                accruedTax = 0;
              }
            }

            currentBalance += rev - cashCosts - taxPayment;
            projection.push(currentBalance);
            labels.push(monthNames[monthIdx]);
          }
          return { projectedLiquidity: projection, projectionLabels: labels };
        }, [
          bankBalance,
          monthlyRevenue,
          totalCosts,
          n_depreciation,
          n_taxRate,
          seasonalFactors,
          currentMonthIdx,
          taxPaymentRhythm,
        ]);
        const isResilient = parseFloat(runwayMonths) >= 3;

        // --- SIMULATION LOGIK ---
        const actualBillableRate = n_billableHours > 0 ? n_monthlyRevenue / n_billableHours : 0;

        const sim_InvestCosts =
          (selectedScenarios.has("vehicle")
            ? (simParams.nvKmPerYear * simParams.nvCostPerKm) / 12 +
              (simParams.nvIsLeasing
                ? simParams.nvLeasingRate
                : simParams.nvAcquisitionCosts / (simParams.nvUsageDuration || 1) / 12 +
                  (simParams.nvAcquisitionCosts * (simParams.nvInterestRate / 100)) / 12)
            : 0) +
          (selectedScenarios.has("machine")
            ? simParams.nmIsLeasing
              ? simParams.nmLeasingRate
              : simParams.nmAcquisitionCosts / (simParams.nmUsageDuration || 1) / 12 +
                (simParams.nmAcquisitionCosts * (simParams.nmInterestRate / 100)) / 12
            : 0) +
          (selectedScenarios.has("it")
            ? simParams.itAnnualSubscriptionCosts + simParams.itInvestmentCosts / (simParams.itUsageDuration || 1) / 12
            : 0);

        const grossMarginPercent = n_monthlyRevenue > 0 ? (n_monthlyRevenue - n_variableCosts) / n_monthlyRevenue : 0;
        const requiredRevenueForInvest = grossMarginPercent > 0 ? sim_InvestCosts / grossMarginPercent : 0;

        const sim_Revenue =
          n_monthlyRevenue *
            (selectedScenarios.has("price")
              ? (1 + simParams.priceChange / 100) * (1 + simParams.volumeChange / 100)
              : 1) +
          (selectedScenarios.has("product") ? simParams.newProdRevenue : 0) +
          (selectedScenarios.has("marketing") ? simParams.marketingRevenue : 0) +
          (selectedScenarios.has("admin_time") ? simParams.billableHoursChange * actualBillableRate : 0);

        const sim_Costs =
          totalCosts +
          (selectedScenarios.has("product") ? simParams.newProdCosts : 0) +
          (selectedScenarios.has("marketing") ? simParams.marketingSpend : 0) +
          (selectedScenarios.has("personnel_cut")
            ? (n_personnelCosts * simParams.personnelChange) / 100 +
              simParams.newEmployeesCount * simParams.newEmployeeSalary
            : 0) +
          (selectedScenarios.has("rent_cut") ? (n_rentCosts * simParams.rentChange) / 100 : 0) +
          sim_InvestCosts;
        const simulatedProfit = sim_Revenue - sim_Costs;
        const simProfitDelta = simulatedProfit - monthlyProfit;

        // Definitionen für Brutto- und Netto-Gewinn (Ist & Simulation)
        const estimatedTax = monthlyProfit > 0 ? monthlyProfit * (n_taxRate / 100) : 0;
        const netProfit = monthlyProfit - estimatedTax;

        // Effektiver Netto-Verdienst pro Arbeitsstunde (wirklich "Netto")
        const effectiveNetEarnings = n_hoursWorked > 0 ? netProfit / n_hoursWorked : 0;

        const monthlyMinReserve =
          (monthlyProfit > 0 ? estimatedTax : 0) + n_monthlyRevenue * (n_revenueBufferPercent / 100);
        const netAfterTax = netProfit;
        const grossProfit = monthlyProfit;
        const taxAmount = estimatedTax;

        const sim_GrossProfit = simulatedProfit;
        const sim_TaxAmount = sim_GrossProfit > 0 ? sim_GrossProfit * (n_taxRate / 100) : 0;
        const sim_NetProfit = sim_GrossProfit - sim_TaxAmount;

        const breakEvenProgress = Math.min(100, totalCosts > 0 ? (n_monthlyRevenue / totalCosts) * 100 : 0).toFixed(0);

        const grossTarget = n_taxRate < 100 ? n_targetNetIncome / (1 - n_taxRate / 100) : n_targetNetIncome;
        const requiredRevenue = grossTarget + totalCosts;
        const targetHourlyRate = n_billableHours > 0 ? requiredRevenue / n_billableHours : 0;

        // Unsichtbare Verluste (Opportunitätskosten)
        const invisibleLoss = Math.max(0, requiredRevenue - n_monthlyRevenue);
        const utilizationRate = n_hoursWorked > 0 ? (n_billableHours / n_hoursWorked) * 100 : 0;

        // Benchmarking-Werte (%)
        const profitMargin = n_monthlyRevenue > 0 ? (monthlyProfit / n_monthlyRevenue) * 100 : 0;
        const sim_ProfitMargin = sim_Revenue > 0 ? (sim_GrossProfit / sim_Revenue) * 100 : 0;
        const profitMarginDelta = sim_ProfitMargin - profitMargin;

        // Extra Ausweis Abschreibungen & Zinsen
        const ist_Abschreibungen = n_depreciation;
        const ist_Zinskosten = n_financing;

        const sim_Abschreibungen =
          ist_Abschreibungen +
          (selectedScenarios.has("machine") && !simParams.nmIsLeasing
            ? simParams.nmAcquisitionCosts / (simParams.nmUsageDuration || 1) / 12
            : 0) +
          (selectedScenarios.has("vehicle") && !simParams.nvIsLeasing
            ? simParams.nvAcquisitionCosts / (simParams.nvUsageDuration || 1) / 12
            : 0) +
          (selectedScenarios.has("it") ? simParams.itInvestmentCosts / (simParams.itUsageDuration || 1) / 12 : 0);

        const sim_Zinskosten =
          ist_Zinskosten +
          (selectedScenarios.has("machine") && !simParams.nmIsLeasing
            ? (simParams.nmAcquisitionCosts * (simParams.nmInterestRate / 100)) / 12
            : 0) +
          (selectedScenarios.has("vehicle") && !simParams.nvIsLeasing
            ? (simParams.nvAcquisitionCosts * (simParams.nvInterestRate / 100)) / 12
            : 0);

        const costBreakdown = {
          Personal: Math.max(
            0,
            n_personnelCosts +
              (selectedScenarios.has("personnel_cut")
                ? (n_personnelCosts * simParams.personnelChange) / 100 +
                  simParams.newEmployeesCount * simParams.newEmployeeSalary
                : 0),
          ),
          "Miete/Raum": Math.max(
            0,
            n_rentCosts + (selectedScenarios.has("rent_cut") ? (n_rentCosts * simParams.rentChange) / 100 : 0),
          ),
          Marketing: n_marketingCosts + (selectedScenarios.has("marketing") ? simParams.marketingSpend : 0),
          "Material/Ware": n_cogs + (selectedScenarios.has("product") ? simParams.newProdCosts : 0),
          Abschreibungen: sim_Abschreibungen,
          Zinskosten: sim_Zinskosten,
          "Sonstige/Betrieb":
            n_otherCosts +
            (selectedScenarios.has("vehicle")
              ? (simParams.nvKmPerYear * simParams.nvCostPerKm) / 12 +
                (simParams.nvIsLeasing ? simParams.nvLeasingRate : 0)
              : 0) +
            (selectedScenarios.has("machine") && simParams.nmIsLeasing ? simParams.nmLeasingRate : 0) +
            (selectedScenarios.has("it") ? simParams.itAnnualSubscriptionCosts : 0),
        };
        const cleanCostBreakdown = Object.fromEntries(Object.entries(costBreakdown).filter(([_, v]) => v > 0));

        const totalInvestments =
          (selectedScenarios.has("machine") && !simParams.nmIsLeasing ? simParams.nmAcquisitionCosts : 0) +
          (selectedScenarios.has("vehicle") && !simParams.nvIsLeasing ? simParams.nvAcquisitionCosts : 0) +
          (selectedScenarios.has("it") ? simParams.itInvestmentCosts : 0);

        const simMonthlyCostsCash = sim_Costs - sim_Abschreibungen;

        const istCashflow = netProfit + ist_Abschreibungen;
        const simCashflow = sim_NetProfit + sim_Abschreibungen;
        const istRunwayNum = parseFloat(runwayMonths);
        const simRunwayNum = sim_Costs > 0 ? Math.max(0, (n_bankBalance - totalInvestments) / sim_Costs) : 0;

        const liquidityScore = Math.min(100, Math.max(0, (parseFloat(runwayMonths) / 6) * 100)); // Ziel: 6 Monate
        const profitabilityScore = Math.min(100, Math.max(0, (profitMargin / 20) * 100)); // Ziel: 20% Rendite

        // Effizienz-Vergleich auf Basis der abrechenbaren Stunden
        const efficiencyScore =
          targetHourlyRate > 0 ? Math.min(100, Math.max(0, (actualBillableRate / targetHourlyRate) * 100)) : 0;

        // Business Health Score (0-100)
        const lossPenalty =
          n_monthlyRevenue > 0 ? Math.min(100, (invisibleLoss / n_monthlyRevenue) * 100) : invisibleLoss > 0 ? 100 : 0;
        const healthScore = Math.round(
          (liquidityScore + profitabilityScore + efficiencyScore + (100 - lossPenalty)) / 4,
        );

        const getMarketInsight = (type, value) => {
          if (type === "liquidity") {
            const months = parseFloat(value);
            if (months < 2) return { text: "Du liegst unter 90% der Selbstständigen", color: "text-red-500" };
            if (months < 4) return { text: "Solider Durchschnitt (Top 50%)", color: "text-orange-500" };
            return { text: "Exzellent! Du gehörst zu den Top 10%", color: "text-green-500" };
          }
          if (type === "profitability") {
            const margin = parseFloat(value);
            if (margin < 8) return { text: "Du liegst unter 70% der Selbstständigen", color: "text-red-500" };
            if (margin < 15) return { text: "Guter Durchschnitt (Top 45%)", color: "text-orange-500" };
            return { text: "Herausragend! Top 10% der Profitabilität", color: "text-green-500" };
          }
          if (type === "efficiency") {
            const rate = parseFloat(value);
            if (rate < 60) return { text: "Du liegst unter 80% der Dienstleister", color: "text-red-500" };
            if (rate < 100) return { text: "Top 40% (Gehobener Durchschnitt)", color: "text-orange-500" };
            return { text: "Elite: Top 5% der Experten-Honorare", color: "text-green-500" };
          }
          return { text: "", color: "" };
        };

        useEffect(() => {
          if (window.lucide) {
            window.lucide.createIcons();
          }
        }, [activeTab, isFlipped, isPro, efficiencyPotential, showAccountManager, csvImportData, accounts]);

        const getRealityChecks = () => {
          const checks = [];
          if (n_billableHours > 200) {
            checks.push(
              "Über 200 abrechenbare Stunden? Das entspricht einer 50h-Woche ohne Admin-Aufwand. Bist du sicher?",
            );
          }
          if (n_taxRate < 15 && monthlyProfit > 2000) {
            checks.push(
              "Deine Steuerquote erscheint sehr niedrig. Selbstständige zahlen meist 25-45% (inkl. Vorsorge/KK).",
            );
          }
          if (n_fixedCosts === 0) {
            checks.push("0€ Fixkosten? Denke an Versicherungen, Software, Telefon und Kontoführungsgebühren.");
          }
          if (effectiveNetEarnings > 300) {
            checks.push(
              `Ein Netto-Stundenverdienst von ${formatCurrency(effectiveNetEarnings, 2)} ist extrem selten. Hast du alle Arbeitsstunden erfasst?`,
            );
          }
          if (profitMargin > 90 && n_monthlyRevenue > 0) {
            checks.push("Eine Rendite von >90% ist ungewöhnlich. Hast du wirklich alle Betriebsausgaben erfasst?");
          }
          return checks;
        };

        const [showSavedToast, setShowSavedToast] = useState(false);
        const [history, setHistory] = useState(() => {
          const saved = localStorage.getItem("dgk_dash_history");
          return saved ? JSON.parse(saved) : [];
        });

        const saveSnapshot = () => {
          const snapshot = {
            date: new Date().toISOString(),
            data: {
              bankBalance: Number(bankBalance),
              monthlyRevenue: Number(monthlyRevenue),
              fixedCosts: Number(fixedCosts),
              variableCosts: Number(variableCosts),
              hoursWorked: Number(hoursWorked),
              targetNetIncome: Number(targetNetIncome),
              taxRate: Number(taxRate),
              billableHours: Number(billableHours),
              financing: Number(financing),
              rentCosts: Number(rentCosts),
              employees: Number(employees),
              personnelCosts: Number(personnelCosts),
              cogs: Number(cogs),
              marketingCosts: Number(marketingCosts),
              otherCosts: Number(otherCosts),
              depreciation: Number(depreciation),
              revenueBufferPercent: Number(revenueBufferPercent),
            },
          };
          const newHistory = [...history, snapshot].slice(-10);
          setHistory(newHistory);
          localStorage.setItem("dgk_dash_history", JSON.stringify(newHistory));
          setShowSavedToast(true);
          setTimeout(() => setShowSavedToast(false), 3000);
        };

        const clearHistory = () => {
          if (confirm("Möchtest du den gesamten Verlauf wirklich löschen und alle Werte auf Standard zurücksetzen?")) {
            setHistory([]);
            localStorage.removeItem("dgk_dash_history");

            // Zurücksetzen auf Standardwerte
            setBankBalance(DEFAULTS.bankBalance);
            setMonthlyRevenue(DEFAULTS.monthlyRevenue);
            setFixedCosts(DEFAULTS.fixedCosts);
            setVariableCosts(DEFAULTS.variableCosts);
            setHoursWorked(DEFAULTS.hoursWorked);
            setTargetNetIncome(DEFAULTS.targetNetIncome);
            setTaxRate(DEFAULTS.taxRate);
            setBillableHours(DEFAULTS.billableHours);
            setFinancing(DEFAULTS.financing);
            setRentCosts(DEFAULTS.rentCosts);
            setEmployees(DEFAULTS.employees);
            setPersonnelCosts(DEFAULTS.personnelCosts);
            setCogs(DEFAULTS.cogs);
            setMarketingCosts(DEFAULTS.marketingCosts);
            setOtherCosts(DEFAULTS.otherCosts);
            setDepreciation(DEFAULTS.depreciation);
            setRevenueBufferPercent(DEFAULTS.revenueBufferPercent);
          }
        };

        const lastSnapshot = history.length > 0 ? history[history.length - 1] : null;

        const getDelta = (current, last) => {
          if (last === null || last === undefined || isNaN(last)) return null;
          return current - last;
        };

        const lastProfit = lastSnapshot
          ? lastSnapshot.data.monthlyRevenue - (lastSnapshot.data.fixedCosts + lastSnapshot.data.variableCosts)
          : null;
        const lastNetProfit = lastProfit !== null ? lastProfit * (1 - (lastSnapshot.data.taxRate || 0) / 100) : null;
        const lastRunway = lastSnapshot
          ? lastSnapshot.data.bankBalance / (lastSnapshot.data.fixedCosts + lastSnapshot.data.variableCosts || 1)
          : null;
        const lastEarnings = lastNetProfit !== null ? lastNetProfit / (lastSnapshot.data.hoursWorked || 1) : null;

        const profitDelta = getDelta(monthlyProfit, lastProfit);
        const runwayDelta = getDelta(parseFloat(runwayMonths), lastRunway);
        const earningsDelta = getDelta(effectiveNetEarnings, lastEarnings);

        const getNudges = () => {
          const nudges = [];
          const currentRunway = parseFloat(runwayMonths);

          if (currentRunway < 1) {
            const gap3Months = Math.max(0, totalCosts * 3 - n_bankBalance);
            nudges.push({
              type: "danger",
              text: `Existenzrisiko: Deine Liquidität reicht für weniger als einen Monat. Erhöhe deinen Puffer um mindestens ${formatCurrency(gap3Months)}, um eine Sicherheit von 3 Monaten zu erreichen.`,
              icon: "shield-alert",
            });
          } else if (currentRunway < 3) {
            const gap6Months = Math.max(0, totalCosts * 6 - n_bankBalance);
            nudges.push({
              type: "warning",
              text: `Liquiditätswarnung: Dein Puffer ist mit unter 3 Monaten zu gering. Baue deine Rücklagen um weitere ${formatCurrency(gap6Months)} auf, um das Ziel von 6 Monaten Sicherheit zu erreichen.`,
              icon: "alert-triangle",
            });
          }

          if (monthlyProfit < 0) {
            const breakEvenGap = Math.abs(monthlyProfit);
            nudges.push({
              type: "danger",
              text: `Verlustzone: Deine Ausgaben übersteigen deine Einnahmen. Steigere deinen monatlichen Rohertrag um mindestens ${formatCurrency(breakEvenGap)}, um die Gewinnschwelle (Break-Even) zu erreichen.`,
              icon: "trending-down",
            });
          } else if (actualBillableRate < targetHourlyRate * 0.9 && targetHourlyRate > 0) {
            const billableRateGap = targetHourlyRate - actualBillableRate;
            nudges.push({
              type: "info",
              text: `Stundensatz-Lücke: Dein erzielter Stundensatz liegt unter deinem Ziel. Steigere deinen Stundensatz um ${formatCurrency(billableRateGap, 2)}, um dein Wunsch-Netto zu erreichen.`,
              icon: "clock",
            });
          }

          if (monthlyProfit > 0) {
            nudges.push({
              type: "success",
              text: `Profitabler Monat! Sichere deinen Erfolg, indem du die Mindestrücklage von ${formatCurrency(monthlyMinReserve)} sofort zur Seite legst.`,
              icon: "check-circle",
            });
          }
          return nudges;
        };

        const formatCurrency = (v, d = 0) =>
          new Intl.NumberFormat("de-DE", {
            style: "currency",
            currency: "EUR",
            minimumFractionDigits: d,
            maximumFractionDigits: d,
          }).format(v);

        const exportToJSON = () => {

          const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });

          a.download = `Strategie-Navigator-Backup-${new Date().toISOString().split("T")[0]}.json`;
          a.click();

        const exportToCSV = () => {

            ["Variable Kosten", variableCosts],

            ["Liquiditaetspuffer (%)", revenueBufferPercent],

          const csvContent = "\uFEFF" + rows.map((e) => e.join(";")).join("\n");
          const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `Strategie-Navigator-Daten-${new Date().toISOString().split("T")[0]}.csv`;
          a.click();
          setShowExportDropdown(false);

        const exportToPDF = async () => {

            { id: "dashboard", label: "Dashboard" },

          const canvases = [];

          setIsFlipped(false);

          try {
            // 1. Header erfassen (nur einmal am Anfang)
            const header = document.getElementById("pdf-header");
            const headerCanvas = await html2canvas(header, {
              scale: 2,
              backgroundColor: "#191818",
              useCORS: true,
              logging: false,

            canvases.push(headerCanvas);

            // 2. Alle Tabs nacheinander durchlaufen und den Inhaltsbereich erfassen
            for (let i = 0; i < tabsToExport.length; i++) {
              setActiveTab(tabsToExport[i].id);
              await new Promise((resolve) => setTimeout(resolve, 800));

              const content = document.getElementById("pdf-content");
              const canvas = await html2canvas(content, {
                scale: 2,
                backgroundColor: "#191818",
                useCORS: true,
                logging: false,
              });
              canvases.push(canvas);
            }

            // 3. Gesamthöhe berechnen (A4 Breite = 210mm als Basis)
            const pdfWidth = 210;
            let currentY = 10;
            const spacing = 10;

            const imagesData = canvases.map((canvas, index) => {
              const imgHeight = (canvas.height * pdfWidth) / canvas.width;
              const y = currentY;
              currentY += imgHeight + (index < canvases.length - 1 ? spacing : 0);
              return { data: canvas.toDataURL("image/png"), height: imgHeight, y };

            // 4. PDF mit der berechneten Gesamthöhe (Inhalt + Puffer + Footer) erstellen
            const footerAreaHeight = 25;
            const totalPdfHeight = currentY + spacing + footerAreaHeight;
            const doc = new jsPDF("p", "mm", [pdfWidth, totalPdfHeight]);

            // Hintergrundfarbe für die gesamte Seite setzen (passend zum dunklen Design)
            doc.setFillColor(25, 24, 24); // #191818
            doc.rect(0, 0, pdfWidth, totalPdfHeight, "F");

            imagesData.forEach((img) => {
              doc.addImage(img.data, "PNG", 0, img.y, pdfWidth, img.height);
            });

            // 5. Footer mit Branding hinzufügen
            const footerY = currentY + spacing;
            doc.setDrawColor(51, 51, 51); // #333 Trennlinie
            doc.line(10, footerY, pdfWidth - 10, footerY);

            doc.setFontSize(10);
            doc.setTextColor(160, 160, 160); // #a0a0a0

            const dateStr = new Date().toLocaleDateString("de-DE");
            doc.text("deingeschaeftskompass.de", 10, footerY + 10);
            doc.text(`Stand: ${dateStr}`, 10, footerY + 16);

            doc.save("Dein-Geschäftskompass-Dashboard.pdf");
          } catch (err) {
            console.error("PDF Export fehlgeschlagen:", err);
            alert("Der Export ist fehlgeschlagen. Bitte versuchen Sie es erneut.");
          } finally {
            setActiveTab(originalTab);
            setIsFlipped(originalFlipped);
            setIsExporting(false);
          }
        };

            <div id="pdf-header" className="text-center mb-12">
              <h1 class="impressum-text-heading1 thq-heading-1">Dein Strategie Navigator</h1>
              <p>Triff fundierte Entscheidungen zu Liquidität, Preisen und Profitabilität. In weniger als 5 Minuten</p>
              <p>
                Wähle unter <i>Liquidität; Effizienz & Preisstratgie</i> deine Werte und erhalte dein eigenes Dashboard
              </p>
            </div>
            {showGuide && (
              <div
                data-html2canvas-ignore
                className="mb-12 p-8 rounded-3xl bg-[#262626]/50 border border-[#333] relative shadow-xl animate-in fade-in duration-700"
              >
                <button
                  onClick={() => setShowGuide(false)}
                  className="absolute top-6 right-6 text-[#60e5ff] hover:text-white transition-colors"
                  title="Anleitung schließen"
                >
                  <i data-lucide="x" className="w-5 h-5"></i>
                </button>

                <div className="flex flex-col gap-8">
                  {/* Header */}
                  <div className="flex items-center gap-2">
                    <i data-lucide="book-open" className="w-4 h-4 text-[#60e5ff]"></i>
                    <span className="text-[#60e5ff] text-sm uppercase tracking-[0.2em]">Kurzanleitung</span>
                  </div>

                  {/* Privacy & Security Note */}
                  <div className="flex items-start gap-5 pb-6 border-b border-white/10">

                    </div>

                  </div>

                  {/* Steps */}

                      <p className="text-white text-lg">Zahlen erfassen</p>

                                  const cleaned = valStr

    <script>
      // Funktion zum Generieren der plattformspezifischen Share-URLs
      function getShareUrl(platform) {
        const url = encodeURIComponent(window.location.href);
        const title = encodeURIComponent(document.title);
        // Versuche, die Meta-Description zu bekommen, sonst leer
        const description = encodeURIComponent(document.querySelector('meta[name="description"]')?.content || "");

        switch (platform) {
          case "facebook":
            // Facebook Share URL: u= für die zu teilende URL
            return `https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${title}`;
          case "reddit":
            // Reddit Share URL: url und title
            return `https://www.reddit.com/submit?url=${url}&title=${title}`;
          case "whatsapp":
            // WhatsApp Share URL: text (Titel + URL)
            return `https://wa.me/?text=${title}%20${url}`;
          case "tumblr":
            // Tumblr Share URL: posttype=link, title und content
            // Du kannst auch posttype=quote oder posttype=text verwenden
            return `https://www.tumblr.com/widgets/share/tool?posttype=link&canonicalUrl=${url}&title=${title}&content=${description}`;
          case "instagram":
            return `https://www.instagram.com/deingeschaeftskompass/`;
          case "wordpress":
            // WordPress.com Share URL: link und title
            return `https://wordpress.com/create/post?url=${url}&title=${title}`;
          default:
            console.warn("Unbekannte Plattform für Teilen-URL:", platform);
            return "#"; // Fallback
        }
      }

      // Funktion für den allgemeinen Teilen-Button (nutzt native Browser-API)
      function sharePage() {
        if (navigator.share) {
          // Wenn der Browser die native Share-API unterstützt
          navigator
            .share({
              title: document.title,
              text: "Schau dir diese Seite an: " + document.title,
              url: window.location.href,
            })
            .then(() => console.log("Erfolgreich geteilt!"))
            .catch((error) => console.log("Fehler beim Teilen:", error));
        } else {
          // Fallback für Browser, die die native Share-API nicht unterstützen
          alert(
            "Ihr Browser unterstützt die native Share-Funktion nicht direkt. Bitte kopieren Sie den Link manuell: " +
              window.location.href,
          );
        }
      }
    </script>

    <script>
      function toggleMobileMenuRest() {
        const mobileMenu = document.getElementById("mobileMenuRest");
        mobileMenu.classList.toggle("open");
      }
    </script>
  </body>
</html>
