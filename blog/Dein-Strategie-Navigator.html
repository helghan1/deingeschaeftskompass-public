      .tooltip-container:hover .tooltip-text {
        visibility: visible;
        opacity: 1;
        bottom: 125%;

      .tooltip-text::after {
        content: "";

        top: 100%;

      /* Premium Flip Button (Uiverse logic) */
      .dgk-flip-btn {
        --border-radius: 16px;
        --padding: 4px;
        --transition: 0.4s;
        --button-color: #1a1a1a;
        --highlight-color-hue: 200deg;

        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        user-select: none;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0.6rem 1.5rem;
        font-family: "Inter", sans-serif;
        font-size: 0.875rem;
        font-weight: 900;
        background-color: var(--button-color);
        border: solid 1px rgba(255, 255, 255, 0.1);
        border-radius: var(--border-radius);
        cursor: pointer;
        transition: all var(--transition);
        box-shadow:
          inset 0px 1px 1px rgba(255, 255, 255, 0.1),
          0px 10px 30px rgba(0, 0, 0, 0.5);
      }

      .dgk-flip-btn::before {
        content: "";
        position: absolute;
        inset: calc(0px - var(--padding));
        border-radius: calc(var(--border-radius) + var(--padding));
        pointer-events: none;
        background-image: linear-gradient(0deg, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.6));
        z-index: -1;
        transition: all var(--transition);
      }

      .dgk-flip-btn::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        background-image: linear-gradient(
          0deg,
          #fff,
          hsl(var(--highlight-color-hue), 100%, 70%),
          hsla(var(--highlight-color-hue), 100%, 70%, 50%),
          8%,
          transparent
        );
        opacity: 0;
        transition: all var(--transition);
      }

      .dgk-flip-btn:hover {
        border: solid 1px hsla(var(--highlight-color-hue), 100%, 80%, 0.4);
        transform: translateX(-50%) translateY(-2px);
      }

      .dgk-flip-btn:hover::after {
        opacity: 1;
        mask-image: linear-gradient(0deg, #fff, transparent);
      }

      .btn-letter {

        display: inline-block;
        color: rgba(255, 255, 255, 0.6);

      @keyframes letter-anim {

    <script type="text/babel">
      const { useState, useEffect } = React;
      function SimProfitChart({ istUmsatz, simUmsatz, istNetto, simNetto }) {
        const chartRef = React.useRef(null);
        const chartInstance = React.useRef(null);

        React.useEffect(() => {
          if (chartRef.current && window.Chart) {
            const ctx = chartRef.current.getContext("2d");
            if (chartInstance.current) chartInstance.current.destroy();

            chartInstance.current = new Chart(ctx, {
              type: "bar",
              data: {
                labels: ["Umsatz", "Netto-Gewinn"],
                datasets: [
                  {
                    label: "Ist-Zustand",
                    data: [istUmsatz, istNetto],
                    backgroundColor: "#9aaebb",
                    borderRadius: 8,
                  },
                  {
                    label: "Simulation",
                    data: [simUmsatz, simNetto],
                    backgroundColor: "#008cba",
                    borderRadius: 8,
                  },
                ],
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                  y: {
                    beginAtZero: true,
                    grid: { color: "rgba(255,255,255,0.05)" },
                    ticks: { color: "#94a3b8", callback: (v) => v.toLocaleString("de-DE") + " €" },
                  },
                  x: { grid: { display: false }, ticks: { color: "#ffffff", font: { weight: "bold" } } },
                },
                plugins: {
                  legend: { position: "bottom", labels: { color: "#94a3b8", boxWidth: 12, usePointStyle: true } },
                },
              },
            });
          }
          return () => {
            if (chartInstance.current) chartInstance.current.destroy();
          };
        }, [istUmsatz, simUmsatz, istNetto, simNetto]);

        return (
          <div className="h-64 w-full">
            <canvas ref={chartRef}></canvas>
          </div>
        );
      }

      function SimCostPieChart({ dataMap }) {
        const chartRef = React.useRef(null);
        const chartInstance = React.useRef(null);

        React.useEffect(() => {
          if (chartRef.current && window.Chart) {
            const ctx = chartRef.current.getContext("2d");
            if (chartInstance.current) chartInstance.current.destroy();

            chartInstance.current = new Chart(ctx, {
              type: "pie",
              data: {
                labels: Object.keys(dataMap),
                datasets: [
                  {
                    data: Object.values(dataMap),
                    backgroundColor: [
                      "#002b51",
                      "#a77948",
                      "#374955",
                      "#9aaebb",
                      "#704819",
                      "rgba(0,43,81,0.6)",
                      "rgba(167,121,72,0.6)",
                      "rgba(55,73,85,0.6)",
                    ],
                    borderWidth: 0,
                  },
                ],
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                  legend: { position: "right", labels: { color: "#94a3b8", boxWidth: 12, usePointStyle: true } },
                  tooltip: {
                    callbacks: {
                      label: function (context) {
                        return " " + context.formattedValue + " €";
                      },
                    },
                  },
                },
              },
            });
          }
          return () => {
            if (chartInstance.current) chartInstance.current.destroy();
          };
        }, [dataMap]);

        return (
          <div className="h-64 w-full">
            <canvas ref={chartRef}></canvas>
          </div>
        );
      }

      function BreakEvenChart({ initialInvest, monthlyRevenue, monthlyCostsCash }) {
        const chartRef = React.useRef(null);
        const chartInstance = React.useRef(null);

        React.useEffect(() => {
          if (chartRef.current && window.Chart) {
            const ctx = chartRef.current.getContext("2d");
            if (chartInstance.current) chartInstance.current.destroy();

            const labels = Array.from({ length: 24 }, (_, i) => `M${i + 1}`);
            const revenueData = labels.map((_, i) => (i + 1) * monthlyRevenue);
            const costData = labels.map((_, i) => initialInvest + (i + 1) * monthlyCostsCash);

            chartInstance.current = new Chart(ctx, {
              type: "line",
              data: {
                labels: labels,
                datasets: [
                  {
                    label: "Kumulierter Umsatz",
                    data: revenueData,
                    borderColor: "#374955",
                    backgroundColor: "rgba(55, 73, 85, 0.1)",
                    fill: true,
                    tension: 0.1,
                  },
                  {
                    label: "Kumulierte Kosten (Cash)",
                    data: costData,
                    borderColor: "#a77948",
                    backgroundColor: "rgba(167, 121, 72, 0.1)",
                    fill: true,
                    tension: 0.1,
                  },
                ],
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                  y: {
                    beginAtZero: true,
                    grid: { color: "rgba(255,255,255,0.05)" },
                    ticks: { color: "#94a3b8", callback: (v) => v.toLocaleString("de-DE") + " €" },
                  },
                  x: { grid: { color: "rgba(255,255,255,0.05)" }, ticks: { color: "#94a3b8" } },
                },
                plugins: {
                  legend: { position: "bottom", labels: { color: "#94a3b8", boxWidth: 12, usePointStyle: true } },
                },
              },
            });
          }
          return () => {
            if (chartInstance.current) chartInstance.current.destroy();
          };
        }, [initialInvest, monthlyRevenue, monthlyCostsCash]);

        return (
          <div className="h-64 w-full">
            <canvas ref={chartRef}></canvas>
          </div>
        );
      }

      function SimCashflowRunwayChart({ istCashflow, simCashflow, istRunway, simRunway, isAnnual }) {
        const chartRef = React.useRef(null);
        const chartInstance = React.useRef(null);

        React.useEffect(() => {
          if (chartRef.current && window.Chart) {
            const ctx = chartRef.current.getContext("2d");
            if (chartInstance.current) chartInstance.current.destroy();

            chartInstance.current = new Chart(ctx, {
              type: "bar",
              data: {
                labels: ["Ist-Zustand", "Simulation"],
                datasets: [
                  {
                    label: isAnnual ? "Jährlicher Cashflow (€)" : "Monatl. Cashflow (€)",
                    data: [istCashflow, simCashflow],
                    backgroundColor: ["#9aaebb", "#008cba"],
                    borderRadius: 8,
                    yAxisID: "y",
                    order: 2,
                  },
                  {
                    type: "line",
                    label: "Runway (Monate)",
                    data: [istRunway, simRunway],
                    borderColor: "#ed982b",
                    backgroundColor: "#ed982b",
                    borderWidth: 3,
                    pointRadius: 6,
                    yAxisID: "y1",
                    order: 1,
                  },
                ],
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                  y: {
                    type: "linear",
                    display: true,
                    position: "left",
                    grid: { color: "rgba(255,255,255,0.05)" },
                    ticks: { color: "#94a3b8", callback: (v) => v.toLocaleString("de-DE") + " €" },
                  },
                  y1: {
                    type: "linear",
                    display: true,
                    position: "right",
                    grid: { drawOnChartArea: false },
                    ticks: { color: "#ed982b", callback: (v) => v.toFixed(1) + " Mon." },
                  },
                  x: { grid: { display: false }, ticks: { color: "#ffffff", font: { weight: "bold" } } },
                },
                plugins: {
                  legend: { position: "bottom", labels: { color: "#94a3b8", boxWidth: 12, usePointStyle: true } },
                },
              },
            });
          }
          return () => {
            if (chartInstance.current) chartInstance.current.destroy();
          };
        }, [istCashflow, simCashflow, istRunway, simRunway]);

        return (
          <div className="h-64 w-full">
            <canvas ref={chartRef}></canvas>
          </div>
        );
      }

      function App() {
        const [activeTab, setActiveTab] = useState("dashboard");
        const [isExporting, setIsExporting] = useState(false);

              // We use a small buffer to trigger the state change
              setIsSticky(rect.top <= 73);
            }

          window.addEventListener("scroll", handleScroll);
          handleScroll(); // Initial check
          return () => window.removeEventListener("scroll", handleScroll);
        }, []);

        useEffect(() => {
          const params = new URLSearchParams(window.location.search);

          // Re-load efficiency potential in case it changed

            setEfficiencyPotential(JSON.parse(saved));
          }
        }, []);

        useEffect(() => {
          localStorage.setItem("dgk_dash_isPro", isPro);
        }, [isPro]);

        useEffect(() => {
          localStorage.setItem("dgk_dash_showGuide", showGuide);
        }, [showGuide]);

        // --- SIMULATION STATES ---
        const [isAnnual, setIsAnnual] = useState(false);
        const displayValue = (val) => (isAnnual ? val * 12 : val);
        const [selectedScenarios, setSelectedScenarios] = useState(new Set());
        const [simParams, setSimParams] = useState({

          });

          setSimParams((prev) => ({ ...prev, [key]: typeof val === "boolean" ? val : Number(val) }));

        // --- DEFAULTS ---
        const DEFAULTS = {
          bankBalance: 85000,
          monthlyRevenue: 15000,
          fixedCosts: 8250,
          variableCosts: 1500,
          hoursWorked: 160,
          targetNetIncome: 3675,
          taxRate: 30,
          billableHours: 120,
          financing: 500,
          rentCosts: 1500,
          employees: 2,
          personnelCosts: 3500,
          cogs: 1500,
          marketingCosts: 1000,
          otherCosts: 1000,

        };

        // --- STATES mit LocalStorage Initialisierung ---
        const loadState = (key, def) => {

        const [bankBalance, setBankBalance] = useState(() => loadState("bankBalance", DEFAULTS.bankBalance));
        const [monthlyRevenue, setMonthlyRevenue] = useState(() =>

        const [fixedCosts, setFixedCosts] = useState(() => loadState("fixedCosts", DEFAULTS.fixedCosts));
        const [variableCosts, setVariableCosts] = useState(() => loadState("variableCosts", DEFAULTS.variableCosts));
        const [hoursWorked, setHoursWorked] = useState(() => loadState("hoursWorked", DEFAULTS.hoursWorked));
        const [targetNetIncome, setTargetNetIncome] = useState(() =>

        const [taxRate, setTaxRate] = useState(() => loadState("taxRate", DEFAULTS.taxRate));

        const [personnelCosts, setPersonnelCosts] = useState(() =>

        );
        const [cogs, setCogs] = useState(() => loadState("cogs", DEFAULTS.cogs));
        const [marketingCosts, setMarketingCosts] = useState(() =>

        );
        const [otherCosts, setOtherCosts] = useState(() => loadState("otherCosts", DEFAULTS.otherCosts));
        const [depreciation, setDepreciation] = useState(() => loadState("depreciation", DEFAULTS.depreciation));
        const [revenueBufferPercent, setRevenueBufferPercent] = useState(() =>
          loadState("revenueBufferPercent", DEFAULTS.revenueBufferPercent),
        );

        const isModified = () => {
          return (
            Number(bankBalance) !== DEFAULTS.bankBalance ||
            Number(monthlyRevenue) !== DEFAULTS.monthlyRevenue ||
            Number(fixedCosts) !== DEFAULTS.fixedCosts ||
            Number(variableCosts) !== DEFAULTS.variableCosts ||
            Number(hoursWorked) !== DEFAULTS.hoursWorked ||
            Number(targetNetIncome) !== DEFAULTS.targetNetIncome ||
            Number(taxRate) !== DEFAULTS.taxRate ||
            Number(billableHours) !== DEFAULTS.billableHours ||
            Number(financing) !== DEFAULTS.financing ||
            Number(rentCosts) !== DEFAULTS.rentCosts ||
            Number(employees) !== DEFAULTS.employees ||
            Number(personnelCosts) !== DEFAULTS.personnelCosts ||
            Number(cogs) !== DEFAULTS.cogs ||
            Number(marketingCosts) !== DEFAULTS.marketingCosts ||
            Number(otherCosts) !== DEFAULTS.otherCosts ||
            Number(depreciation) !== DEFAULTS.depreciation ||
            Number(revenueBufferPercent) !== DEFAULTS.revenueBufferPercent
          );
        };

        // Automatisches Speichern bei Änderung
        useEffect(() => {
          localStorage.setItem("dgk_dash_bankBalance", bankBalance);
          localStorage.setItem("dgk_dash_monthlyRevenue", monthlyRevenue);
          localStorage.setItem("dgk_dash_fixedCosts", fixedCosts);
          localStorage.setItem("dgk_dash_variableCosts", variableCosts);
          localStorage.setItem("dgk_dash_hoursWorked", hoursWorked);
          localStorage.setItem("dgk_dash_targetNetIncome", targetNetIncome);
          localStorage.setItem("dgk_dash_taxRate", taxRate);
          localStorage.setItem("dgk_dash_billableHours", billableHours);
          localStorage.setItem("dgk_dash_financing", financing);
          localStorage.setItem("dgk_dash_rentCosts", rentCosts);
          localStorage.setItem("dgk_dash_employees", employees);
          localStorage.setItem("dgk_dash_personnelCosts", personnelCosts);
          localStorage.setItem("dgk_dash_cogs", cogs);
          localStorage.setItem("dgk_dash_marketingCosts", marketingCosts);
          localStorage.setItem("dgk_dash_otherCosts", otherCosts);
          localStorage.setItem("dgk_dash_depreciation", depreciation);
          localStorage.setItem("dgk_dash_revenueBufferPercent", revenueBufferPercent);
        }, [
          bankBalance,
          monthlyRevenue,
          fixedCosts,
          variableCosts,
          hoursWorked,
          targetNetIncome,
          taxRate,
          billableHours,
          financing,
          rentCosts,
          employees,
          personnelCosts,
          cogs,
          marketingCosts,
          otherCosts,
          depreciation,
          revenueBufferPercent,
        ]);

        // NEU: Synchronisierung der einfachen Kostenfelder im Expertenmodus
        useEffect(() => {
          if (isPro) {
            // Wir mappen die Experten-Felder auf die einfache Ansicht:
            // Variable Kosten = Wareneinsatz (COGS)
            // Fixkosten = Summe aller anderen betrieblichen Ausgaben
            const calculatedFixed =
              Number(financing) +
              Number(rentCosts) +
              Number(personnelCosts) +
              Number(marketingCosts) +
              Number(otherCosts) +
              Number(depreciation);
            setFixedCosts(calculatedFixed);
            setVariableCosts(Number(cogs));
          }
        }, [isPro, financing, rentCosts, personnelCosts, marketingCosts, otherCosts, depreciation, cogs]);

        const n_bankBalance = Number(bankBalance) || 0;
        const n_monthlyRevenue = Number(monthlyRevenue) || 0;
        const n_fixedCosts = Number(fixedCosts) || 0;
        const n_variableCosts = Number(variableCosts) || 0;
        const n_hoursWorked = Number(hoursWorked) || 0;
        const n_targetNetIncome = Number(targetNetIncome) || 0;
        const n_taxRate = Number(taxRate) || 0;
        const n_billableHours = Number(billableHours) || 0;
        const n_financing = Number(financing) || 0;
        const n_rentCosts = Number(rentCosts) || 0;
        const n_personnelCosts = Number(personnelCosts) || 0;
        const n_cogs = Number(cogs) || 0;
        const n_marketingCosts = Number(marketingCosts) || 0;
        const n_otherCosts = Number(otherCosts) || 0;
        const n_depreciation = Number(depreciation) || 0;
        const n_revenueBufferPercent = Number(revenueBufferPercent) || 0;

        // Da die Werte im Hintergrund synchronisiert werden, reicht diese einfache Summe
        const totalCosts = n_fixedCosts + n_variableCosts;
        const monthlyProfit = n_monthlyRevenue - totalCosts;
        const runwayMonths = totalCosts > 0 ? (n_bankBalance / totalCosts).toFixed(1) : "0";
        const isResilient = parseFloat(runwayMonths) >= 3;

        // --- SIMULATION LOGIK ---
        const actualBillableRate = n_billableHours > 0 ? n_monthlyRevenue / n_billableHours : 0;

        const sim_InvestCosts =
          (selectedScenarios.has("vehicle")
            ? (simParams.nvKmPerYear * simParams.nvCostPerKm) / 12 +
              (simParams.nvIsLeasing
                ? simParams.nvLeasingRate
                : simParams.nvAcquisitionCosts / (simParams.nvUsageDuration || 1) / 12 +
                  (simParams.nvAcquisitionCosts * (simParams.nvInterestRate / 100)) / 12)
            : 0) +
          (selectedScenarios.has("machine")
            ? simParams.nmIsLeasing
              ? simParams.nmLeasingRate
              : simParams.nmAcquisitionCosts / (simParams.nmUsageDuration || 1) / 12 +
                (simParams.nmAcquisitionCosts * (simParams.nmInterestRate / 100)) / 12
            : 0) +
          (selectedScenarios.has("it")
            ? simParams.itAnnualSubscriptionCosts + simParams.itInvestmentCosts / (simParams.itUsageDuration || 1) / 12
            : 0);

        const grossMarginPercent = n_monthlyRevenue > 0 ? (n_monthlyRevenue - n_variableCosts) / n_monthlyRevenue : 0;
        const requiredRevenueForInvest = grossMarginPercent > 0 ? sim_InvestCosts / grossMarginPercent : 0;

        const sim_Revenue =
          n_monthlyRevenue *
            (selectedScenarios.has("price")
              ? (1 + simParams.priceChange / 100) * (1 + simParams.volumeChange / 100)
              : 1) +
          (selectedScenarios.has("product") ? simParams.newProdRevenue : 0) +
          (selectedScenarios.has("marketing") ? simParams.marketingRevenue : 0) +
          (selectedScenarios.has("admin_time") ? simParams.billableHoursChange * actualBillableRate : 0);

        const sim_Costs =
          totalCosts +
          (selectedScenarios.has("product") ? simParams.newProdCosts : 0) +
          (selectedScenarios.has("marketing") ? simParams.marketingSpend : 0) +
          (selectedScenarios.has("personnel_cut")
            ? (n_personnelCosts * simParams.personnelChange) / 100 +
              simParams.newEmployeesCount * simParams.newEmployeeSalary
            : 0) +
          (selectedScenarios.has("rent_cut") ? (n_rentCosts * simParams.rentChange) / 100 : 0) +
          sim_InvestCosts;
        const simulatedProfit = sim_Revenue - sim_Costs;
        const simProfitDelta = simulatedProfit - monthlyProfit;
        const effectiveHourlyRate = n_hoursWorked > 0 ? monthlyProfit / n_hoursWorked : 0;

        // Zusätzliche Berechnungen für den "Aha-Effekt"
        const estimatedTax = monthlyProfit > 0 ? monthlyProfit * (n_taxRate / 100) : 0;
        const monthlyMinReserve =
          (monthlyProfit > 0 ? estimatedTax : 0) + n_monthlyRevenue * (n_revenueBufferPercent / 100);
        const netAfterTax = monthlyProfit - estimatedTax;
        // Definitionen für Brutto- und Netto-Gewinn (Ist & Simulation)
        const grossProfit = monthlyProfit;
        const taxAmount = estimatedTax;
        const netProfit = netAfterTax;

        const sim_GrossProfit = simulatedProfit;
        const sim_TaxAmount = sim_GrossProfit > 0 ? sim_GrossProfit * (n_taxRate / 100) : 0;
        const sim_NetProfit = sim_GrossProfit - sim_TaxAmount;

        const breakEvenProgress = Math.min(100, totalCosts > 0 ? (n_monthlyRevenue / totalCosts) * 100 : 0).toFixed(0);

        const grossTarget = n_taxRate < 100 ? n_targetNetIncome / (1 - n_taxRate / 100) : n_targetNetIncome;
        const requiredRevenue = grossTarget + totalCosts;
        const targetHourlyRate = n_billableHours > 0 ? requiredRevenue / n_billableHours : 0;

        // Unsichtbare Verluste (Opportunitätskosten)
        const invisibleLoss = Math.max(0, requiredRevenue - n_monthlyRevenue);
        const utilizationRate = n_hoursWorked > 0 ? (n_billableHours / n_hoursWorked) * 100 : 0;

        // Benchmarking-Werte (%)
        const profitMargin = n_monthlyRevenue > 0 ? (monthlyProfit / n_monthlyRevenue) * 100 : 0;
        const sim_ProfitMargin = sim_Revenue > 0 ? (sim_GrossProfit / sim_Revenue) * 100 : 0;
        const profitMarginDelta = sim_ProfitMargin - profitMargin;

        // Extra Ausweis Abschreibungen & Zinsen
        const ist_Abschreibungen = n_depreciation;
        const ist_Zinskosten = n_financing;

        const sim_Abschreibungen =
          ist_Abschreibungen +
          (selectedScenarios.has("machine") && !simParams.nmIsLeasing
            ? simParams.nmAcquisitionCosts / (simParams.nmUsageDuration || 1) / 12
            : 0) +
          (selectedScenarios.has("vehicle") && !simParams.nvIsLeasing
            ? simParams.nvAcquisitionCosts / (simParams.nvUsageDuration || 1) / 12
            : 0) +
          (selectedScenarios.has("it") ? simParams.itInvestmentCosts / (simParams.itUsageDuration || 1) / 12 : 0);

        const sim_Zinskosten =
          ist_Zinskosten +
          (selectedScenarios.has("machine") && !simParams.nmIsLeasing
            ? (simParams.nmAcquisitionCosts * (simParams.nmInterestRate / 100)) / 12
            : 0) +
          (selectedScenarios.has("vehicle") && !simParams.nvIsLeasing
            ? (simParams.nvAcquisitionCosts * (simParams.nvInterestRate / 100)) / 12
            : 0);

        const costBreakdown = {
          Personal: Math.max(
            0,
            n_personnelCosts +
              (selectedScenarios.has("personnel_cut")
                ? (n_personnelCosts * simParams.personnelChange) / 100 +
                  simParams.newEmployeesCount * simParams.newEmployeeSalary
                : 0),
          ),
          "Miete/Raum": Math.max(
            0,
            n_rentCosts + (selectedScenarios.has("rent_cut") ? (n_rentCosts * simParams.rentChange) / 100 : 0),
          ),
          Marketing: n_marketingCosts + (selectedScenarios.has("marketing") ? simParams.marketingSpend : 0),
          "Material/Ware": n_cogs + (selectedScenarios.has("product") ? simParams.newProdCosts : 0),
          Abschreibungen: sim_Abschreibungen,
          Zinskosten: sim_Zinskosten,
          "Sonstige/Betrieb":
            n_otherCosts +
            (selectedScenarios.has("vehicle")
              ? (simParams.nvKmPerYear * simParams.nvCostPerKm) / 12 +
                (simParams.nvIsLeasing ? simParams.nvLeasingRate : 0)
              : 0) +
            (selectedScenarios.has("machine") && simParams.nmIsLeasing ? simParams.nmLeasingRate : 0) +
            (selectedScenarios.has("it") ? simParams.itAnnualSubscriptionCosts : 0),
        };
        const cleanCostBreakdown = Object.fromEntries(Object.entries(costBreakdown).filter(([_, v]) => v > 0));

        const totalInvestments =
          (selectedScenarios.has("machine") && !simParams.nmIsLeasing ? simParams.nmAcquisitionCosts : 0) +
          (selectedScenarios.has("vehicle") && !simParams.nvIsLeasing ? simParams.nvAcquisitionCosts : 0) +
          (selectedScenarios.has("it") ? simParams.itInvestmentCosts : 0);

        const simMonthlyCostsCash = sim_Costs - sim_Abschreibungen;

        const istCashflow = netProfit + ist_Abschreibungen;
        const simCashflow = sim_NetProfit + sim_Abschreibungen;
        const istRunwayNum = parseFloat(runwayMonths);
        const simRunwayNum = sim_Costs > 0 ? Math.max(0, (n_bankBalance - totalInvestments) / sim_Costs) : 0;

        const liquidityScore = Math.min(100, Math.max(0, (parseFloat(runwayMonths) / 6) * 100)); // Ziel: 6 Monate
        const profitabilityScore = Math.min(100, Math.max(0, (profitMargin / 20) * 100)); // Ziel: 20% Rendite

        // Effizienz-Vergleich auf Basis der abrechenbaren Stunden
        const efficiencyScore =
          targetHourlyRate > 0 ? Math.min(100, Math.max(0, (actualBillableRate / targetHourlyRate) * 100)) : 0;

        // Business Health Score (0-100)
        const lossPenalty =
          n_monthlyRevenue > 0 ? Math.min(100, (invisibleLoss / n_monthlyRevenue) * 100) : invisibleLoss > 0 ? 100 : 0;
        const healthScore = Math.round(
          (liquidityScore + profitabilityScore + efficiencyScore + (100 - lossPenalty)) / 4,
        );

        const getMarketInsight = (type, value) => {
          if (type === "liquidity") {
            const months = parseFloat(value);
            if (months < 2) return { text: "Du liegst unter 90% der Selbstständigen", color: "text-red-500" };
            if (months < 4) return { text: "Solider Durchschnitt (Top 50%)", color: "text-orange-500" };
            return { text: "Exzellent! Du gehörst zu den Top 10%", color: "text-green-500" };
          }
          if (type === "profitability") {
            const margin = parseFloat(value);
            if (margin < 8) return { text: "Du liegst unter 70% der Selbstständigen", color: "text-red-500" };
            if (margin < 15) return { text: "Guter Durchschnitt (Top 45%)", color: "text-orange-500" };
            return { text: "Herausragend! Top 10% der Profitabilität", color: "text-green-500" };
          }
          if (type === "efficiency") {
            const rate = parseFloat(value);
            if (rate < 60) return { text: "Du liegst unter 80% der Dienstleister", color: "text-red-500" };
            if (rate < 100) return { text: "Top 40% (Gehobener Durchschnitt)", color: "text-orange-500" };
            return { text: "Elite: Top 5% der Experten-Honorare", color: "text-green-500" };
          }
          return { text: "", color: "" };
        };

        useEffect(() => {
          if (window.lucide) {
            window.lucide.createIcons();
          }
        }, [activeTab, isFlipped, isPro, efficiencyPotential]);

        const getRealityChecks = () => {
          const checks = [];
          if (n_billableHours > 200) {
            checks.push(
              "Über 200 abrechenbare Stunden? Das entspricht einer 50h-Woche ohne Admin-Aufwand. Bist du sicher?",
            );
          }
          if (n_taxRate < 15 && monthlyProfit > 2000) {
            checks.push(
              "Deine Steuerquote erscheint sehr niedrig. Selbstständige zahlen meist 25-45% (inkl. Vorsorge/KK).",
            );
          }
          if (n_fixedCosts === 0) {
            checks.push("0€ Fixkosten? Denke an Versicherungen, Software, Telefon und Kontoführungsgebühren.");
          }
          if (effectiveHourlyRate > 400) {
            checks.push(
              `Ein Stundensatz von ${formatCurrency(effectiveHourlyRate)} ist extrem selten. Hast du alle Arbeitsstunden erfasst?`,
            );
          }
          if (profitMargin > 90 && n_monthlyRevenue > 0) {
            checks.push("Eine Rendite von >90% ist ungewöhnlich. Hast du wirklich alle Betriebsausgaben erfasst?");
          }
          return checks;
        };

        const [showSavedToast, setShowSavedToast] = useState(false);
        const [history, setHistory] = useState(() => {
          const saved = localStorage.getItem("dgk_dash_history");
          return saved ? JSON.parse(saved) : [];
        });

        const saveSnapshot = () => {
          const snapshot = {
            date: new Date().toISOString(),
            data: {
              bankBalance: Number(bankBalance),
              monthlyRevenue: Number(monthlyRevenue),
              fixedCosts: Number(fixedCosts),
              variableCosts: Number(variableCosts),
              hoursWorked: Number(hoursWorked),
              targetNetIncome: Number(targetNetIncome),
              taxRate: Number(taxRate),
              billableHours: Number(billableHours),
              financing: Number(financing),
              rentCosts: Number(rentCosts),
              employees: Number(employees),
              personnelCosts: Number(personnelCosts),
              cogs: Number(cogs),
              marketingCosts: Number(marketingCosts),
              otherCosts: Number(otherCosts),
              depreciation: Number(depreciation),
              revenueBufferPercent: Number(revenueBufferPercent),
            },
          };
          const newHistory = [...history, snapshot].slice(-10);
          setHistory(newHistory);
          localStorage.setItem("dgk_dash_history", JSON.stringify(newHistory));
          setShowSavedToast(true);

              backgroundColor: "#191818",
              useCORS: true,
              logging: false,

            // 2. Alle Tabs nacheinander durchlaufen und den Inhaltsbereich erfassen

              canvases.push(canvas);

            // 3. Gesamthöhe berechnen (A4 Breite = 210mm als Basis)
            const pdfWidth = 210;
            let currentY = 0;
            const spacing = 10; // 10mm Abstand zwischen den Sektionen

            const imagesData = canvases.map((canvas, index) => {
              const imgHeight = (canvas.height * pdfWidth) / canvas.width;
              const y = currentY;
              currentY += imgHeight + (index < canvases.length - 1 ? spacing : 0);
              return { data: canvas.toDataURL("image/png"), height: imgHeight, y };
            });

            // 4. PDF mit der berechneten Gesamthöhe (Inhalt + Puffer + Footer) erstellen
            const footerAreaHeight = 25;
            const totalPdfHeight = currentY + spacing + footerAreaHeight;
            const doc = new jsPDF("p", "mm", [pdfWidth, totalPdfHeight]);

            doc.setFillColor(25, 24, 24); // #191818

            // 5. Footer mit Branding hinzufügen
            const footerY = currentY + spacing;
            doc.setDrawColor(51, 51, 51); // #333 Trennlinie
            doc.line(10, footerY, pdfWidth - 10, footerY);

            doc.setFontSize(10);
            doc.setTextColor(160, 160, 160); // #a0a0a0

            const dateStr = new Date().toLocaleDateString("de-DE");
            doc.text("deingeschaeftskompass.de", 10, footerY + 10);
            doc.text(`Stand: ${dateStr}`, 10, footerY + 16);

            doc.save("Dein-Geschäftskompass-Dashboard.pdf");

    <script>
      // Funktion zum Generieren der plattformspezifischen Share-URLs
      function getShareUrl(platform) {
        const url = encodeURIComponent(window.location.href);
        const title = encodeURIComponent(document.title);
        // Versuche, die Meta-Description zu bekommen, sonst leer
        const description = encodeURIComponent(document.querySelector('meta[name="description"]')?.content || "");

        switch (platform) {
          case "facebook":
            // Facebook Share URL: u= für die zu teilende URL
            return `https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${title}`;
          case "reddit":
            // Reddit Share URL: url und title
            return `https://www.reddit.com/submit?url=${url}&title=${title}`;
          case "whatsapp":
            // WhatsApp Share URL: text (Titel + URL)
            return `https://wa.me/?text=${title}%20${url}`;
          case "tumblr":
            // Tumblr Share URL: posttype=link, title und content
            // Du kannst auch posttype=quote oder posttype=text verwenden
            return `https://www.tumblr.com/widgets/share/tool?posttype=link&canonicalUrl=${url}&title=${title}&content=${description}`;
          case "instagram":
            return `https://www.instagram.com/deingeschaeftskompass/`;
          case "wordpress":
            // WordPress.com Share URL: link und title
            return `https://wordpress.com/create/post?url=${url}&title=${title}`;
          default:
            console.warn("Unbekannte Plattform für Teilen-URL:", platform);
            return "#"; // Fallback
        }
      }

      // Funktion für den allgemeinen Teilen-Button (nutzt native Browser-API)
      function sharePage() {
        if (navigator.share) {
          // Wenn der Browser die native Share-API unterstützt
          navigator
            .share({
              title: document.title,
              text: "Schau dir diese Seite an: " + document.title,
              url: window.location.href,
            })
            .then(() => console.log("Erfolgreich geteilt!"))
            .catch((error) => console.log("Fehler beim Teilen:", error));
        } else {
          // Fallback für Browser, die die native Share-API nicht unterstützen
          alert(
            "Ihr Browser unterstützt die native Share-Funktion nicht direkt. Bitte kopieren Sie den Link manuell: " +
              window.location.href,
          );
        }
      }
    </script>
